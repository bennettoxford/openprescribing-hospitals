deployments:
- name: scmd-full-pipeline
  description: Complete pipeline
  version:
  entrypoint: pipeline/pipeline.py:scmd_pipeline
  parameters:
    run_import_flows: true
    run_load_flows: true
  work_pool:
    name: oph
    work_queue_name: default
    job_variables:
      image: prefecthq/prefect:3-python3.11
      env:
        PREFECT_ENVIRONMENT: deployment
  schedule:
  build:
  tags: []
  concurrency_limit:
  schedules: []
  pull:
  - prefect.deployments.steps.git_clone:
      id: clone-step
      repository: https://github.com/bennettoxford/openprescribing-hospitals.git
      branch: main
  - prefect.deployments.steps.run_shell_script:
      directory: '{{ clone-step.directory }}'
      script: /bin/bash -lc 'set -euo pipefail; python -m pip install --upgrade --root-user-action ignore uv; python -m uv export --locked --group pipeline --no-dev --no-emit-package prefect -o requirements.prefect.txt; python -m uv pip install --system --no-deps -r requirements.prefect.txt'
