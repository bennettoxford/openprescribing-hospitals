name: AIR/MART inhalers # Full name of the measure/indicator
short_name: AIR/MART inhalers # Abbreviated name or acronym
description: Percentage of inhaler doses that are for inhalers not licensed for MART/AIR therapy # Brief 1-2 sentence description of what this measure identifies
why_it_matters: |
    The [BTS/NICE/SIGN guidance](https://www.nice.org.uk/guidance/ng245/2024) published in November 2024 made significant changes recommendations to asthma management. 
    It states *[do not prescribe short-acting beta₂ agonists (SABAs) to people of any age with asthma without a concomitant prescription of an inhaled corticosteroid (ICS)](https://www.nice.org.uk/guidance/ng245/chapter/Recommendations#principles-of-pharmacological-treatment)*. 
    For the majority of patients, it recommends use of a combined ICS and formoterol under an AIR (as-needed ICS/formoterol) or MART (maintenance and reliever therapy) regimen.  

    This measure tracks prescribing of SABA and ICS inhalers that are not licensed for AIR/MART, as a proportion of all SABA and ICS inhaler prescribing. 
    A lower value indicates a greater proportion of prescribing consistent with the updated guideline recommendation.
how_is_it_calculated: >
    We divide the number of doses of inhalers not licensed for MART/AIR therapy by the total number of corticosteroid containing inhaler doses (excluding triple therapy inhalers, as they are more commonly used in COPD) and then multiply that by 100 to obtain the % each month.
