name: AIR/MART inhalers # Full name of the measure/indicator
short_name: AIR/MART inhalers # Abbreviated name or acronym
description: Percentage of corticosteroid containing inhaler doses that are for inhalers not licensed for MART/AIR therapy # Brief 1-2 sentence description of what this measure identifies
why_it_matters: |
    The [BTS/NICE/SIGN guidance](https://www.nice.org.uk/guidance/ng245/2024) published in November 2024 made significant changes to recommendations for asthma management. 
    For the majority of patients, [it recommends](https://www.nice.org.uk/guidance/ng245/chapter/Recommendations#principles-of-pharmacological-treatment) use of a combined ICS and formoterol under an AIR (as-needed ICS/formoterol) or MART (maintenance and reliever therapy) regimen.  
how_is_it_calculated: >
    We divide the number of doses of corticosteroid containing inhalers not licensed for MART/AIR therapy by the total number of corticosteroid containing inhaler doses and then multiply that by 100 to obtain the % each month. We exclude triple therapy inhalers, as they are more commonly used in COPD.
