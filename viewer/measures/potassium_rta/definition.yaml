name: Safer potassium injectables # Full name of the measure/indicator
short_name: Safer potassium injectables # Abbreviated name or acronym
description: Percentage of high-strength potassium chloride or potassium dihydrogen phosphate injectable unit doses not supplied as ampoules or vials # Brief 1-2 sentence description of what this measure identifies
why_it_matters: |  
  Ampoules or vials of concentrated potassium require preparation and carry a higher risk of dosing and administration errors. A [patient safety alert - Potassium solutions: risks to patients from errors occurring during intravenous administration](https://webarchive.nationalarchives.gov.uk/ukgwa/20171030131025/http://www.nrls.npsa.nhs.uk/resources/?entryid45=59882&cord=ASC) was first published in 2002 with the aim of reducing the risk of accidental overdose of intravenous potassium arising from use of potassium chloride concentrate solutions and other strong potassium solutions. 
  
The safety alert is considered one of the Enduring Standards for Safe Storage of Medicines. The enduring standards are specific actions from previous patient safety alerts identified as likely to always be relevant or unlikely to change in the immediate future. They represent actions that should be embedded systematically across NHS provider organisations. [Enduring standards that remain valid from previous patient safety alerts](https://www.england.nhs.uk/patient-safety/patient-safety-insight/patient-safety-alerts/enduring-standards/standards-that-remain-valid/).  

how_is_it_calculated: |
  Virtual Medicinal Products (VMPs) are included if they have a Virtual Therapeutic Moiety (VTM) and an ingredient strength for potassium chloride or potassium dihydrogen phosphate above 0.5% weight/volume (strength per 1 ml: greater than 0.005 g when expressed in grams, or greater than 5 mg when expressed in milligrams). Presentations are limited by unit dose unit of measure to vial, bag, bottle, ampoule, or pre-filled syringe. VMPs without a VTM are excluded (for example, certain combination products). Presentations with unit dose unit of measure ampoule or vial are denominator-only for the measure; other eligible presentations are numerator VMPs. The monthly percentage is total unit doses of numerator VMPs divided by total unit doses of all included VMPs, multiplied by 100.
