name: Safer potassium injectables # Full name of the measure/indicator
short_name: Safer potassium injectables # Abbreviated name or acronym
description: Percentage of high-strength potassium chloride or potassium dihydrogen phosphate injectable unit doses not supplied as ampoules or vials # Brief 1-2 sentence description of what this measure identifies
why_it_matters: |  
  Ampoules or vials of concentrated potassium require preparation and carry a higher risk of dosing and administration errors. A [patient safety alert - Potassium solutions: risks to patients from errors occurring during intravenous administration](https://webarchive.nationalarchives.gov.uk/ukgwa/20171030131025/http://www.nrls.npsa.nhs.uk/resources/?entryid45=59882&cord=ASC) was first published in 2002 with the aim of reducing the risk of accidental overdose of intravenous potassium arising from use of potassium chloride concentrate solutions and other strong potassium solutions. One of the actions in the alert was: Commercially prepared ready to use diluted solutions containing potassium should be used wherever possible. 
  
  The safety alert is considered one of the NHS England *Enduring Standards* for Safe Storage of Medicines. The enduring standards are specific actions from previous patient safety alerts identified as likely to always be relevant or unlikely to change in the immediate future. They represent actions that should be embedded systematically across NHS provider organisations. [Enduring standards that remain valid from previous patient safety alerts](https://www.england.nhs.uk/patient-safety/patient-safety-insight/patient-safety-alerts/enduring-standards/standards-that-remain-valid/).  

how_is_it_calculated: |
   First we identify Virtual Therapeutic Moieties (VTMs) which contain potassium chloride or potassium hihydrogen phosphate. Then we look for all Virtual Medicinal Products (VMPs) identified with those VTMs. Once we have identified all of the relevant product VMPs, we then need to identify *injectable products* using their unit of measure (vial, bag, bottle, ampoule, or pre-filled syringe) and *products with a strength >40mmol/L* [(Note: high strength potassium chloride solutions are defined as 10% potassium chloride (1gram potassium in 10ml)) but we need to capture all of the diluted to ready to administer products for inclusion in the measure](https://www.sps.nhs.uk/articles/hypokalaemia/) or more. Products that have been issued as ampoules or vials are numerator VMPs and all other products are denominator VMPs. The monthly percentage is total unit doses of numerator VMPs divided by total unit doses of all included VMPs, multiplied by 100. Products with no VTM are not included in this measure including: Require a VTM (vtm_id IS NOT NULL) so VMPs with no VTM are excluded, including e.g.Generic Addiphos solution for infusion 20ml vials.
