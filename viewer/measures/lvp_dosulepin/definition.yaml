description: Total indicative cost for dosulepin. # Brief 1-2 sentence description of what this measure identifies
why_it_matters: |
    [NHS England guidance](https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/) identifies a number of items which provide low value when prescribed. This guidance has mainly been aimed at primary care but we think it is important to also monitor a selection of these in hospitals - read more about why [in our blog](https://www.bennett.ox.ac.uk/blog/2025/04/low-value-medicines-in-openprescribing-hospitals/).
    
    [NHS England guidance](https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#dosulepin-2017) states
    
    Dosulepin, formerly known as dothiepin, is a tricyclic antidepressant. NICE guidance on depression in adults has a ‘do not do’ recommendation:
    Do not switch to, or start, dosulepin because evidence supporting its tolerability relative to other antidepressants is outweighed by the increased cardiac risk and toxicity in overdose.
    
    Due to the significant safety concerns advised by NICE, the joint clinical working group considered dosulepin suitable for inclusion in this guidance.

    For guidance on when prescribing may be appropriate in some exceptional circumstances, please see the [full NHS England guidance document](https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#items-where-prescribing-may-be-appropriate-in-some-exceptional-circumstances).

how_is_it_calculated: >
    We display the indicative spend for dosulepin. You can read more about indicative cost in our [FAQs](https://hospitals.openprescribing.net/faq/#what-is-indicative-cost)
