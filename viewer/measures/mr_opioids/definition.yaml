name: Prolonged-release opioids # Full name of the measure/indicator
short_name: Prolonged-release opioids # Abbreviated name or acronym
description: Percentage of oral oxycodone and morphine (up to and including 10mg per dose) issued that is prolonged-release # Brief 1-2 sentence description of what this measure identifies
why_it_matters: |  
    The MHRA has [issued a drug safety update](https://www.gov.uk/drug-safety-update/prolonged-release-opioids-removal-of-indication-for-relief-of-post-operative-pain) advising healthcare professionals that prolonged-release opioids should not be used to treat acute pain after surgery. Following a safety review, the indication for post-operative pain has been removed from the licences of prolonged-release morphine and oxycodone.

    Post-operative pain is usually short-lived and should only require short-term pain management, best treated with immediate-release opioids. Evidence shows that using prolonged-release opioids after surgery increases the risk of continued opioid use beyond 90 days and the risk of opioid-induced ventilatory impairment.

how_is_it_calculated: |
    We divide the combined number of [Defined Daily Doses](https://hospitals.openprescribing.net/faq/#what-is-a-defined-daily-dose-ddd) of oral oxycodone and morphine prolonged-release (up to and including  10mg per unit dose) by the total number of Defined Daily Doses of all oral oxycodone and morphine (up to and including 10mg per unit dose) products and then multiply that by 100 to obtain a percentage each month. 

