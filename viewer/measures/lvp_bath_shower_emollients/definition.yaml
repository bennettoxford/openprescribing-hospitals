name: Low value prescribing - bath and shower emollients # Full name of the measure/indicator
short_name: Low value prescribing - bath and shower emollients # Abbreviated name or acronym
description: Total indicative cost for bath and shower emollients # Brief 1-2 sentence description of what this measure identifies
why_it_matters: |
    [NHS England guidance](https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/) identifies a number of items which provide low value when prescribed. This guidance has mainly been aimed at primary care but we think it is important to also monitor a selection of these in hospitals - read more about why [in our blog](https://www.bennett.ox.ac.uk/blog/2025/04/low-value-medicines-in-openprescribing-hospitals/).

    [NHS England guidance states](https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#bath-and-shower-preparations-for-dry-and-pruritic-skin-conditions-updated-2023):
    > [NICE guidance](https://www.nice.org.uk/guidance/cg57) recommends that emollient bath additives should not be offered to children under the age of 12 for the management of atopic eczema, because they are not clinically- or cost-effective.  
    >  
    > ‘Leave-on’ emollient moisturisers can still be used for treating eczema. These emollients can also be used as a soap substitute.  
    >  
    >  It is recognised that this recommendation applies only to children; however, it was agreed that it is acceptable to extrapolate this recommendation to apply to adults until other good quality evidence emerges.  

    For guidance on when prescribing may be appropriate in some exceptional circumstances, please see the [full NHS England guidance document](https://www.england.nhs.uk/long-read/items-which-should-not-routinely-be-prescribed-in-primary-care-policy-guidance/#items-where-prescribing-may-be-appropriate-in-some-exceptional-circumstances).
how_is_it_calculated: >
    We display the indicative spend for bath and shower emollients. You can read more about indicative cost in our [FAQs](https://hospitals.openprescribing.net/faq/#what-is-indicative-cost)
