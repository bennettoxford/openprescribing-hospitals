name: Oral anticoagulation that is not direct oral anticoagulants # Full name of the measure/indicator
short_name: Vitamin K antagonists # Abbreviated name or acronym
description: Percentage of oral anticoagulants that are not direct oral anticoagulants. # Brief 1-2 sentence description of what this measure identifies
why_it_matters: |
   NICE guidelines 
   DOACs are safer than warfarin

    **Please note:** OpenPrescribing Hospitals measures have a consistent way of visualising measures, where 'lower is better' and therefore in this case we show the proportion of DOACs which are NOT prescribed as rivaroxaban or apixaban tablets.  There are also other oral formulations of DOACs recently introduced onto the market. We do not consider these to be as cost-effective, and they are not considered as first-line in this measure. You can read more about these details and the timeline of the commissioning recommendations in our [blog](https://www.bennett.ox.ac.uk/blog/2024/10/changes-to-direct-oral-anticoagulant-doac-measure/).
how_is_it_calculated: >
    We divide the combined number of defined daily doses (DDDs) of oral anticoagulants that are **NOT** DOACs by the total number of DDDs of all oral anticoagulants and then multiply that by 100 to obtain a percentage each month. Rivaroxaban 15mg/20mg treatment initiation packs have been excluded from the measure as it is not possible to allocate a defined daily dose for comparison.
