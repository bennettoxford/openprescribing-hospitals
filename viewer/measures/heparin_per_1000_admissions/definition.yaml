name: Intravenous unfractionated heparin per 1000 admissions # Full name of the measure/indicator
short_name: IV unfractionated heparin per 1000 admissions  # Abbreviated name or acronym
description: Rate of intravenous unfractionated heparin issuing per 1000 admissions # Brief 1-2 sentence description of what this measure identifies
why_it_matters: |
      Unfractionated heparin is a [leading cause of anticoagulation safety related adverse events](https://www.amjmed.com/article/S0002-9343(23)00344-3/fulltext).
      In 2026, the [American College of Cardiology/American Heart Association guidelines](https://www.jacc.org/doi/10.1016/j.jacc.2025.11.005) for the treatment of Evaluation and Management of Acute Pulmonary Embolism in Adults recommended low molecular weight heparin over intravenous unfractioned to reduce recurrent VTE and major bleeding for the intital treatment of pulmonary embolism. 

how_is_it_calculated: |
     We identify all products with the 'heparin sodium' in their name. We then extract all products with the following concentrations: 1,000 units in 1ml, 5,000 units in 1ml or 25,000 units in 5ml.  We divide the combined number of [Defined Daily Doses (DDDs)](https://hospitals.openprescribing.net/faq/#what-is-a-defined-daily-dose-ddd) of unfractionated heparin by the number of [admissions](https://hospitals.openprescribing.net/faq/#hospital-admissions) expressed per 1000 to give a rate per 1000 admissions.
     
     Caution with the interpretation of this measure: Specialist cardiac organisations have a lower number of admissions each year as compared with a large acute hospital organisation and a higher number of procedures which may use intraveous heparin, which may yield a high number of defined daily doses of heparin per 1000 admissions. The measure is designed to support all organisations looking at their intravenous unfractionated heparin usage, but the context of use should be taken into consideration. 

